name: Weather Alert Bot

on:
  schedule:
    - cron: '0 6 * * *'   # every day 6 AM
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert bot
        run: python alert_bot.py
